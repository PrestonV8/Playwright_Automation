name: CI - Playwright Wrapper

on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main"]
    workflow_dispatch:


jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: Install Playwright Browsers
              run: |
                python -m playwright install --with-deps
            # wrapper command: adjust to what is local
            - name: Run wrapper smoke suite
              run: |
                python run_playwright.py --env staging --suite "smoke"

            - name: Upload reports (if present)
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: reports
                path: | 
                    reports/playwright-report/results/
                if-no-files-found: ignore
